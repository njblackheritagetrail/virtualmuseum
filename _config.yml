title: <a href="https://blackheritagetrail.nj.gov/">New Jersey Black Heritage Trail</a>
description: The New Jersey Black Heritage Trail was signed into law on September 7, 2022. The legislation calls for the New Jersey Historical Commission (NJHC) to establish a Black Heritage Trail “to promote awareness and appreciation of Black history, heritage, and culture” that will “highlight Black heritage sites through historical markers and a trail-like path that connects the stories of Black life and resiliency.” The New Jersey Black Heritage Trail was developed under the leadership of the New Jersey Historical Commission’s African American History Program. Under this program, the Historical Commission works in cooperation with other state agencies, such as the Historic Preservation Office, the Division of Travel and Tourism, as well as local governments, owners or operators of Black heritage sites, and others to identify a series of sites.

title: New Jersey Black Heritage Trail Virtual Museum
description: On select historical markers, visitors will find a 5x10-inch aluminum plate with a Virtual Museum QR code. The New Jersey Black Heritage Trail Virtual Museum invites viewers to learn more about Black history and heritage sites in New Jersey through photographs, documents, and other related information. No application is required to access the Virtual Museum, but visitors will need to scan the QR code and follow the on-screen prompts to activate the experience.

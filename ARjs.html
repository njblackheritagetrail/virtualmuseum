<script>
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(function(stream) {
      console.log("Camera permission granted");
    })
    .catch(function(err) {
      console.log("Camera permission denied: " + err);
    });
</script>
<a-scene
    vr-mode-ui="enabled: false;"
    renderer="logarithmicDepthBuffer: true;"
    embedded
    arjs="trackingMethod: best; sourceType: webcam;debugUIEnabled: false;"
  >
    <a-nft
      type="nft"
      url="https://raw.githubusercontent.com/njblackheritagetrail/virtualmuseum/main/drakeHouseQRCode.png"
      smooth="true"
      smoothCount="10"
      smoothTolerance=".01"
      smoothThreshold="5"
    >
    </a-nft>
</a-scene>
<iframe src="https://raw.githubusercontent.com/njblackheritagetrail/virtualmuseum/main/drakehouse.html" width="100%" height="100%"></iframe>
